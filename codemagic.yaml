workflows:
  ios-no-codesign:
    name: SkyMain iOS No Codesign Build
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Show project files
        script: |
          pwd
          ls
          ls ios || true
          ls ios/Runner.xcodeproj || true
          ls ios/Runner.xcodeproj/xcshareddata/xcschemes || true

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Clean iOS pods
        script: |
          cd ios
          rm -rf Pods Podfile.lock
          pod install
          cd ..

      - name: Build iOS without codesigning
        script: |
          flutter build ios --debug --no-codesign

    artifacts:
      - build/ios/iphoneos/Runner.app
      - build/ios/iphoneos/*.app
      - /tmp/xcodebuild_logs/*.log